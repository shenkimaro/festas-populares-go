# Configuração para ambiente de desenvolvimento local
# Edite a linha DocumentRoot abaixo conforme necessário para testar diferentes sites

<VirtualHost *:80>
    ServerName localhost
    ServerAlias 127.0.0.1
    
    # ALTERE AQUI: Aponte para o site que está desenvolvendo
    # Exemplos:
    # DocumentRoot "/usr/local/apache2/htdocs/linkedopenarchives"
    # DocumentRoot "/usr/local/apache2/htdocs/sambaglobal"
    # DocumentRoot "/usr/local/apache2/htdocs/criar"
    # DocumentRoot "/usr/local/apache2/htdocs/memorial_samba"
    
    DocumentRoot "/usr/local/apache2/htdocs/"
    
    <Directory "/usr/local/apache2/htdocs">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.html index.php
    </Directory>

        # Omeka files storage - Diáspora Africana no Brasil
    # Alias /projects/memoravelsamba/files /var/www/disco_sistemas/omeka/memoravelsamba/files
    # <Directory "/var/www/disco_sistemas/omeka/memoravelsamba/files">
    #     Options -Indexes +FollowSymLinks
    #     AllowOverride None
    #     Require all granted
    # </Directory>
    
    # PHP-FPM Configuration
    # ALTERE AQUI: Ajuste o caminho do PHP conforme o site
    ProxyPassMatch ^\/(.*\.php?(\/.*)?)$ fcgi://appphp:9000/var/www/html/$1
    
    # Logs específicos para desenvolvimento
    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
