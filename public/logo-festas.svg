<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fita vermelha esquerda -->
  <path d="M 50 80 Q 40 60, 50 40 L 100 60 Q 90 80, 80 100 Z" fill="#C41E3A"/>
  
  <!-- Fita vermelha direita -->
  <path d="M 350 80 Q 360 60, 350 40 L 300 60 Q 310 80, 320 100 Z" fill="#C41E3A"/>
  
  <!-- Bastão decorativo -->
  <rect x="150" y="70" width="100" height="15" fill="#8B4513" rx="7"/>
  <circle cx="160" cy="77" r="8" fill="#FFD700"/>
  <circle cx="240" cy="77" r="8" fill="#C41E3A"/>
  
  <!-- Decoração com pontos -->
  <circle cx="120" cy="90" r="6" fill="#FFD700"/>
  <circle cx="280" cy="90" r="6" fill="#FFD700"/>
  
  <!-- Texto principal -->
  <text x="200" y="140" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#2C3E50">
    FESTAS POPULARES
  </text>
  
  <!-- Subtítulo -->
  <text x="200" y="170" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#C41E3A">
    de Goiás
  </text>
</svg>